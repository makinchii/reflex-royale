<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reflex Royale</title>
    <link rel="stylesheet" href="/game.css" />
  </head>
  <body>
    <div class="mode-select">
      <h1 class="game-title"><a href="/">Reflex Royale</a></h1>
      <p class="subtitle">Test your reflexes. Beat your friends.</p>

      <div class="mode-cards">
        <a class="mode-card" href="/play">
          <span class="mode-icon">🎮</span>
          <span class="mode-label">Local Play</span>
          <span class="mode-desc">2-4 players on one device, each with their own buzzer key</span>
        </a>
        <a class="mode-card" href="/play/online">
          <span class="mode-icon">🌐</span>
          <span class="mode-label">Online Play</span>
          <span class="mode-desc">2-4 players on separate devices via room codes</span>
        </a>
      </div>

      <div style="margin-top: 32px;">
        <a class="btn btn-secondary" href="/login">Login</a>
        <a class="btn btn-secondary" href="/signup" style="margin-left:8px;">Sign Up</a>
      </div>
    </div>
  </body>
</html>
