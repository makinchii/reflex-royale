<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Play</title>
    <link rel="stylesheet" href="/game.css" />
  </head>
  <body data-page="dashboard">
    <div id="account-menu-root" class="account-menu-root"></div>
    <main class="mode-select" data-page="dashboard">
      <h1 class="game-title"><a href="/">Reflex Royale</a></h1>
      <p class="subtitle" id="dashboard-subtitle">Welcome back. Open an online room, chase the leaderboard, or hold position from your neon command center.</p>

      <div class="mode-cards">
        <a class="mode-card" href="/local">
          <span class="mode-icon">🎮</span>
          <span class="mode-label">Local Play</span>
          <span class="mode-desc">2-4 players on one device, each with their own buzzer key</span>
        </a>
        <a class="mode-card" href="/online">
          <span class="mode-icon">🌐</span>
          <span class="mode-label">Online Room</span>
          <span class="mode-desc">Create or join a room so each player can use a separate device</span>
        </a>
      </div>

      <div class="dashboard-actions">
        <a class="btn btn-secondary" href="/">Back Home</a>
        <button type="button" class="btn btn-secondary" id="logout-btn">Log Out</button>
      </div>
    </main>
    <script src="/js/accountMenu.js"></script>
    <script src="/js/pageNotifications.js"></script>
    <script src="/script.js"></script>
  </body>
</html>
